<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var query = search.slice(1) + (hash ? '&hash=' + hash.slice(1) : '');
      window.location.replace(
        '/?p=' + encodeURIComponent(path) + (query ? '&' + query : '')
      );
    </script>
  </head>
  <body></body>
</html>
